name: Deploy to Hostinger

on:
  push:
    branches:
      - main # Cambia a 'master' si esa es tu rama principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configura el entorno de Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Usa la versión de Node.js de tu proyecto

      # 3. Instala las dependencias
      - name: Install Dependencies
        run: npm install

      # 4. Construye el proyecto (genera la carpeta dist)
      - name: Build Project
        run: npm run build

      # 5. Sube la carpeta dist a Hostinger por FTP
      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Especificamos que solo suba el contenido de la carpeta dist
          local-dir: ./dist/
          # La carpeta destino en Hostinger (usualmente public_html para el dominio principal)
          server-dir: ./public_html/